version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: ai_interview_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: interviewprep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend Server Service
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai_interview_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/interviewprep?schema=public
      JWT_SECRET: supersecretkey_interviewprep_2026_prod
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLIENT_URL: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      - db
    # Switch schema provider to postgresql, generate client, push schema, and start
    command: sh -c "npm run prisma:use-postgres && npx prisma generate && npx prisma db push && npm start"

  # Frontend Client Service
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    container_name: ai_interview_client
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - server

volumes:
  postgres_data:
